<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoProposal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px; height: 200px;
      background: #1677ff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo { font-size: 26px; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
    .subtitle { font-size: 12px; opacity: 0.75; margin-bottom: 28px; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status { font-size: 12px; opacity: 0.8; text-align: center; padding: 0 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="logo">Deadline</div>
  <div class="subtitle">AI 科研写作助手</div>
  <div class="spinner"></div>
  <div id="status">正在启动…</div>
</body>
</html>
